<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- Configurações básicas de idioma, caracteres e responsividade. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Yasmin Czarnik</title>

    <!-- Importa os estilos da pasta css. -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Cabeçalho com menu de navegação entre as quatro páginas. -->
    <header>
        <h1>Yasmin Czarnik Alegria e Silva</h1>

        <nav aria-label="Navegação principal">
            <a href="index.html">Sobre Mim</a>
            <a href="formacao.html">Formação</a>
            <a href="portfolio.html">Portfólio</a>
            <a href="contato.html" aria-current="page">Contato</a>
        </nav>
    </header>

    <!-- Conteúdo principal com formulário de contato. -->
    <main>
        <section class="card">

            <h2>Contato</h2>

            <!-- O formulário é validado pelo arquivo JavaScript antes da simulação de envio. -->
            <form id="formContato" novalidate>

                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" autocomplete="name">

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" autocomplete="email">

                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" rows="5"></textarea>

                <button type="submit">Enviar</button>

            </form>

        </section>
    </main>

    <!-- Rodapé da página. -->
    <footer>
        <p>© 2026 - Yasmin Czarnik Alegria e Silva</p>
    </footer>

    <!-- Importa o JavaScript responsável pela validação do formulário. -->
    <script src="js/script.js"></script>

</body>

</html>
